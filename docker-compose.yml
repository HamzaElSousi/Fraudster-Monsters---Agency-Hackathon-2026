version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro              # JSONL data files (read-only)
      - duckdb_vol:/app/duckdb_cache # persist DuckDB file between restarts
    environment:
      DATA_DIR: /data
      DUCKDB_PATH: /app/duckdb_cache/hackathon.duckdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  duckdb_vol:
    # Persists the .duckdb file so JSONL preload (~2min) only happens once
