version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data                 # JSONL + pre-built hackathon.duckdb (needs write for DuckDB WAL)
    env_file:
      - path: .env
        required: false   # AI keys: ANTHROPIC_API_KEY, AWS_*, BEDROCK_MODEL_ID
      - path: backend/.env
        required: false   # DB_CONNECTION_STRING (gitignored — copy from backend/.env.example)
    environment:
      DATA_DIR: /data
      DUCKDB_PATH: /data/hackathon.duckdb  # use pre-built DB — no slow first-run JSONL reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""   # empty = relative /api/ calls, proxied by nginx to backend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

